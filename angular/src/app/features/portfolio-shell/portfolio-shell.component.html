<main class="portfolio-shell">
  @switch (state()) {
    @case ('loading') {
      <p class="portfolio-shell__status" role="status">Loading portfolio…</p>
    }
    @case ('error') {
      <div class="portfolio-shell__status" role="alert">
        <p>We couldn't load the portfolio right now.</p>
        <button type="button" class="btn btn--primary" (click)="load()">Retry</button>
      </div>
    }
    @case ('success') {
      @if (portfolio(); as data) {
        <app-hero-section [profile]="data.profile" />

        <div class="portfolio-shell__scene-toggle">
          <button type="button" class="btn btn--secondary" (click)="toggle3D()">
            {{ is3DEnabled() ? 'Exit 3D' : 'Enter 3D' }}
          </button>
        </div>
        @defer (when is3DEnabled(); prefetch on idle) {
          <app-scene-canvas (closeRequested)="is3DEnabled.set(false)" />
        } @loading {
          <p class="portfolio-shell__status" role="status">Loading 3D preview…</p>
        }

        <app-about-section [profile]="data.profile" />
        <app-featured-projects-section [projects]="data.featuredProjects" />
        <app-skills-section [skillGroups]="data.skillGroups" />
        <app-contact-cta-section [profile]="data.profile" />
      }
    }
  }
</main>
